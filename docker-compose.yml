version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - education-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=education_agent
      # SECRET_KEY: 生产环境必须设置，否则每次启动自动生成新密钥
      - SECRET_KEY=${SECRET_KEY:-}
      # AI模型配置
      - AI_MODEL=${AI_MODEL:-deepseek/chat}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - DEBUG=${DEBUG:-false}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - education-network
    restart: unless-stopped

  # MongoDB数据库
  mongodb:
    image: mongo:7
    ports:
      # 仅在需要外部访问时暴露，生产环境建议去掉
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - education-network
    restart: unless-stopped

networks:
  education-network:
    driver: bridge

volumes:
  mongodb-data:
